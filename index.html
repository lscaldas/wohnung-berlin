<style>

  .thumb.ph{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px}
  .body{flex:1;min-width:0}
  .titleline{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .title{font-weight:600;font-size:14px;margin:0 0 3px}

  .loc{color:var(--muted);font-size:12px;margin-top:3px}
  .badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .b{font-size:11px;padding:1px 7px;border-radius:5px;border:1px solid var(--line);color:var(--muted)}
  .b.new{background:rgba(79,157,255,.15);color:#9cc6ff;border-color:#34507a}
  .b.s2{background:rgba(54,201,139,.13);color:#7fe3bb;border-color:#2c6a51}
  .b.exch{background:rgba(217,107,208,.13);color:#eaa6e4;border-color:#7a3675}
  .b.warn{background:rgba(239,94,94,.13);color:#f3a0a0;border-color:#7a3434}
  .b.furn{background:rgba(240,162,59,.13);color:#f3c889;border-color:#7a5a2c}
  .b.src{color:#c9d2df}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  .stats{display:flex;flex-wrap:wrap;gap:10px;padding:11px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;min-width:118px}

</style>

const euro = v => v == null ? "?" : "€" + Math.round(v).toLocaleString("en-GB");
const numf = v => v == null ? "?" : (Math.round(v*10)/10).toLocaleString("en-GB");
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));

// ---- header chips ----
document.getElementById("chips").innerHTML =
  `<span class="chip"><b>${META.matches}</b> matches</span>` +
  `<span class="chip"><b>${META.new_matches}</b> new</span>` +
  `<span class="chip"><b>${META.exchange}</b> swaps</span>` +
  `<span class="chip"><b>${META.total}</b> total</span>`;
document.getElementById("genline").textContent =
  "Updated " + META.generated + " · criteria: ≥" + META.criteria.min_size_m2 +
  " m², ≤ " + euro(META.criteria.max_warm_rent) + " warm";

// ---- defaults from criteria ----
document.getElementById("minSize").value = META.criteria.min_size_m2;
document.getElementById("maxWarm").value = META.criteria.max_warm_rent;
document.getElementById("maxS2").value = META.criteria.s2_max_distance_m;  // corridor cap by default

// ---- source filter checkboxes ----
const sf = document.getElementById("srcfilter");
META.sources.forEach(s => {
  const id = "src_" + s;
  sf.insertAdjacentHTML("beforeend",
    `<label><input type="checkbox" class="srcbox" value="${esc(s)}" checked> ${esc(s)}</label>`);
});

// ---- map ----
const map = L.map("map", {scrollWheelZoom:true}).setView([52.483, 13.355], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {maxZoom:19, attribution:"&copy; OpenStreetMap"}).addTo(map);

// Berlin Ortsteile (neighbourhoods): each tinted with its own colour from a hash
// of the name, so the divisions are visible without a 96-entry legend. Sits under
// the S2 line and the listing markers (added afterwards).
function nbHue(name){ let h=0; for(let i=0;i<name.length;i++) h=(h*31 + name.charCodeAt(i))>>>0; return h%360; }
let nbLayer = null;
if(GEO && GEO.features){
  nbLayer = L.geoJSON(GEO, {
    style: f => { const h = nbHue(f.properties.name||"");
      return {color:`hsl(${h},60%,42%)`, weight:1, opacity:.55, fillColor:`hsl(${h},65%,52%)`, fillOpacity:.14}; },
    onEachFeature: (f,l) => {
      l.bindTooltip(f.properties.name, {sticky:true, direction:"top", className:"nb-tip"});
      l.on("mouseover", () => l.setStyle({fillOpacity:.3, weight:2}));
      l.on("mouseout",  () => nbLayer.resetStyle(l));
    }
  }).addTo(map);
  L.control.layers(null, {"Neighbourhoods": nbLayer}, {collapsed:false, position:"topright"}).addTo(map);
}

// S2 line + stations
L.polyline(S2.map(s => [s.lat, s.lon]), {color:"#4f9dff", weight:3, opacity:.55}).addTo(map);
S2.forEach(s => {
  L.circleMarker([s.lat, s.lon], {radius:4, color:"#4f9dff", fillColor:"#0f1115", fillOpacity:1, weight:2})
    .bindTooltip("S2 " + s.name, {direction:"top"}).addTo(map);
});

const listingLayer = L.layerGroup().addTo(map);
const markers = {};

function markerColor(r){
  if(r.status === "gone") return "#6b7280";
  if(r.is_exchange) return "#d96bd0";
  return "#36c98b";
}

// ---- filtering / rendering ----
function currentFilters(){
  const srcs = new Set([...document.querySelectorAll(".srcbox:checked")].map(b => b.value));
  return {
    q: document.getElementById("q").value.trim().toLowerCase(),
    sort: document.getElementById("sort").value,
    minSize: parseFloat(document.getElementById("minSize").value) || 0,
    maxWarm: parseFloat(document.getElementById("maxWarm").value) || Infinity,
    maxS2: parseFloat(document.getElementById("maxS2").value) || Infinity,
    hideExch: document.getElementById("hideExch").checked,
    hideTemp: document.getElementById("hideTemp").checked,
    hideFurn: document.getElementById("hideFurn").checked,
    showGone: document.getElementById("showGone").checked,
    srcs
  };
}

function keep(r, f){
  if(r.status === "gone" && !f.showGone) return false;
  if(f.hideExch && r.is_exchange) return false;
  if(f.hideTemp && r.temporary) return false;
  if(f.hideFurn && r.furnished) return false;
  if(!f.srcs.has(r.source)) return false;
  if(r.size_m2 != null && r.size_m2 < f.minSize) return false;
  // price: respect plausibility floor, then the max
  if(r.warm_rent != null){
    if(r.warm_rent < META.criteria.min_plausible_warm) return false;
    if(r.warm_rent > f.maxWarm) return false;
  }
  if(f.maxS2 !== Infinity && (r.s2_distance_m == null || r.s2_distance_m > f.maxS2)) return false;
  if(f.q){
    const hay = (r.title+" "+(r.address||"")+" "+(r.district||"")+" "+(r.plz||"")).toLowerCase();
    if(!hay.includes(f.q)) return false;
  }
  return true;
}

function sortRows(rows, key){
  const by = {
    s2:  (a,b) => (a.s2_distance_m??9e9) - (b.s2_distance_m??9e9),
    price:(a,b) => (a.warm_rent??9e9) - (b.warm_rent??9e9),
    size:(a,b) => (b.size_m2??0) - (a.size_m2??0),
    score:(a,b) => (b.score??0) - (a.score??0),
    new: (a,b) => (b.is_new?1:0) - (a.is_new?1:0) || (b.score??0)-(a.score??0),
  }[key];
  return rows.slice().sort(by);
}

let selectedId = null;
function selectCard(id, pan){
  selectedId = id;
  document.querySelectorAll(".card").forEach(c => c.classList.toggle("sel", c.dataset.id === id));
  const m = markers[id];
  if(m){ if(pan) map.panTo(m.getLatLng()); m.openPopup(); }
}

function cardHTML(r){
  const badges = [];
  if(r.is_new) badges.push(`<span class="b new">NEW</span>`);
  badges.push(`<span class="b src">${esc(r.source)}</span>`);
  if(r.is_exchange) badges.push(`<span class="b exch">SWAP</span>`);
  if(r.s2_distance_m != null && r.s2_distance_m <= META.criteria.s2_max_distance_m)
    badges.push(`<span class="b s2">Near S2</span>`);
  if(r.furnished) badges.push(`<span class="b furn">furnished</span>`);
  if(r.temporary) badges.push(`<span class="b furn">temporary</span>`);
  if(r.warm_is_estimated) badges.push(`<span class="b warn">Warm est.</span>`);
  if(r.implausible) badges.push(`<span class="b warn">Check price</span>`);
  if(r.status === "gone") badges.push(`<span class="b">inactive</span>`);

  const s2 = r.nearest_s2 ? `S2 ${esc(r.nearest_s2)} &middot; ${r.s2_distance_m!=null?Math.round(r.s2_distance_m)+" m":"?"}` : "";
  const thumb = r.thumbnail
    ? `<img class="thumb" loading="lazy" src="${esc(r.thumbnail)}" alt="" onerror="this.onerror=null;this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb ph',textContent:'no image'}))">`
    : `<div class="thumb ph">no image</div>`;
  return `<div class="card ${r.status==='gone'?'gone':''} ${r.id===selectedId?'sel':''}" data-id="${esc(r.id)}">
    ${thumb}
    <div class="body">
      <div class="titleline">
        <p class="title"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a></p>
        <span class="price">${euro(r.warm_rent)}${r.warm_is_estimated?"*":""}</span>
      </div>
      <div class="facts">${numf(r.size_m2)} m&sup2; &middot; ${r.rooms!=null?numf(r.rooms)+" rm":"? rm"} &middot; cold ${euro(r.cold_rent)} &middot; Score ${r.score??"?"}</div>
      <div class="loc">${esc(r.district||r.plz||"")} ${r.address?("&middot; "+esc(r.address)):""}<br>${s2}</div>
      <div class="badges">${badges.join("")}</div>
    </div>
  </div>`;
}

function render(){
  const f = currentFilters();
  let rows = LISTINGS.filter(r => keep(r, f));
  rows = sortRows(rows, f.sort);

  document.getElementById("count").textContent = `${rows.length} of ${LISTINGS.length} listings`;
  const host = document.getElementById("cards");
  host.innerHTML = rows.length ? rows.map(cardHTML).join("") : `<div class="empty">No listings match these filters.</div>`;

  // markers
  listingLayer.clearLayers();
  for(const k in markers) delete markers[k];
  rows.forEach(r => {
    if(r.lat == null || r.lon == null) return;
    const m = L.circleMarker([r.lat, r.lon],
      {radius:7, color:"#0f1115", weight:1.5, fillColor:markerColor(r), fillOpacity:.95});
    m.bindPopup(`<b>${esc(r.title)}</b><br>${euro(r.warm_rent)} &middot; ${numf(r.size_m2)} m&sup2;<br>` +
      `<a href="${esc(r.url)}" target="_blank" rel="noopener">View listing</a>`);
    m.on("click", () => selectCard(r.id, false));
    m.addTo(listingLayer);
    markers[r.id] = m;
  });

  host.querySelectorAll(".card").forEach(c => {
    c.addEventListener("click", e => {
      if(e.target.tagName === "A") return; // let links work
      selectCard(c.dataset.id, true);
    });
  });
}

["q","sort","minSize","maxWarm","maxS2"].forEach(id =>
  document.getElementById(id).addEventListener("input", render));
["hideExch","hideTemp","hideFurn","showGone"].forEach(id =>
  document.getElementById(id).addEventListener("change", render));
document.getElementById("srcfilter").addEventListener("change", render);

const $ = id => document.getElementById(id);
function setSrc(v){ document.querySelectorAll(".srcbox").forEach(b => b.checked = v); }

$("btnReset").addEventListener("click", () => {            // back to the S2-corridor defaults
  $("q").value = ""; $("minSize").value = META.criteria.min_size_m2;
  $("maxWarm").value = META.criteria.max_warm_rent; $("maxS2").value = META.criteria.s2_max_distance_m;
  $("hideExch").checked = true; $("hideTemp").checked = true; $("hideFurn").checked = false; $("showGone").checked = false;
  setSrc(true); render();
});
$("btnAll").addEventListener("click", () => {              // show everything that was scraped
  $("q").value = ""; $("minSize").value = ""; $("maxWarm").value = ""; $("maxS2").value = "";
  $("hideExch").checked = false; $("hideTemp").checked = false; $("hideFurn").checked = false; $("showGone").checked = true;
  setSrc(true); render();
});

// ---- market stats (computed from the listing lifecycle history) ----
function statCard(v, l, sub){
  return `<div class="stat"><div class="v">${v}</div><div class="l">${l}</div>${sub?`<div class="sub2">${sub}</div>`:""}</div>`;
}
function renderStats(){
  const mr = LISTINGS.filter(r => r.passes);            // relevant apartments (incl. gone)
  const day = iso => iso ? iso.slice(0,10) : null;
  const now = Date.now();
  const arr = {}, dep = {};
  mr.forEach(r => { const d = day(r.first_seen); if(d) arr[d] = (arr[d]||0)+1; });
  const gone = mr.filter(r => r.status === "gone");
  gone.forEach(r => { const d = day(r.last_seen); if(d) dep[d] = (dep[d]||0)+1; });
  const spans = gone.map(r => (new Date(r.last_seen) - new Date(r.first_seen))/864e5)
                    .filter(x => x >= 0).sort((a,b) => a-b);
  const med = spans.length ? spans[Math.floor(spans.length/2)] : null;
  const w24 = spans.length ? Math.round(100*spans.filter(x => x <= 1).length/spans.length) : null;
  const wk = now - 7*864e5;
  const newWk = mr.filter(r => r.first_seen && new Date(r.first_seen).getTime() >= wk).length;
  const goneWk = gone.filter(r => r.last_seen && new Date(r.last_seen).getTime() >= wk).length;
  const activeM = mr.filter(r => r.status === "active").length;
  const days = []; for(let i=13;i>=0;i--) days.push(new Date(now - i*864e5).toISOString().slice(0,10));
  const mx = Math.max(1, ...days.map(d => arr[d]||0));
  const bars = days.map(d =>
    `<div class="b" style="height:${Math.round(100*(arr[d]||0)/mx)}%" title="${d}: +${arr[d]||0} new / -${dep[d]||0} gone"></div>`).join("");
  const span = v => v == null ? "–" : (v < 1 ? Math.round(v*24)+" h" : v.toFixed(1)+" days");
  document.getElementById("stats").innerHTML =
    statCard(activeM, "Active matches") +
    statCard(newWk, "New (7 days)") +
    statCard(goneWk, "Gone (7d)") +
    statCard(span(med), "Typ. time listed", w24 != null ? (w24 + "% < 24 h → act fast") : "needs more data") +
    `<div class="stat statwide"><div class="l">New per day (14 days)</div><div class="spark">${bars}</div>` +
      `<div class="sub2">${META.runs} runs since ${META.tracking_since || "?"} · as of ${META.last_run || META.generated}</div></div>`;
}
renderStats();
render();
</script>
